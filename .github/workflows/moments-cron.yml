name: Moments cron

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger moments endpoint
        run: |
          curl -fsS -X GET "https://gather-fawn.vercel.app/api/cron/moments" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
